<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Threadline" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Instrument+Serif:ital@0;1&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function () {
				var pref;
				try {
					pref = JSON.parse(localStorage.getItem('threadline-preferences') || '{}').appearance;
				} catch (e) {}
				var dark =
					pref === 'dark' ||
					((!pref || pref === 'auto') && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (dark) document.documentElement.classList.add('dark');
			})();
		</script>
		<div
			id="splash"
			style="
				position: fixed;
				inset: 0;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #fafafa;
			"
		>
			<style>
				.dark #splash {
					background: #09090b;
				}
				.dark #splash-mark {
					background: #fafafa;
					color: #09090b;
				}
				#splash-mark {
					animation: pulse 1.5s ease-in-out infinite;
				}
				@keyframes pulse {
					0%,
					100% {
						opacity: 0.4;
					}
					50% {
						opacity: 1;
					}
				}
			</style>
			<div
				id="splash-mark"
				style="
					width: 40px;
					height: 40px;
					display: flex;
					align-items: center;
					justify-content: center;
					background: #09090b;
					color: #fafafa;
					font-size: 18px;
					font-weight: 300;
					font-style: italic;
					font-family: system-ui, sans-serif;
				"
			>
				/
			</div>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
