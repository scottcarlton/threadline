<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline · Threadline</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				background: #fafafa;
				color: #2c2d30;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
			}
			.wrap {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 2rem;
				text-align: center;
			}
			.glyph {
				width: 56px;
				height: 56px;
				border-radius: 0;
				background: #2c2d30;
				color: #fafafa;
				display: flex;
				align-items: center;
				justify-content: center;
				font-style: italic;
				font-size: 1.5rem;
				margin-bottom: 1.5rem;
			}
			h1 {
				font-size: 1.5rem;
				font-weight: 600;
				margin: 0 0 0.5rem 0;
			}
			p {
				font-size: 0.875rem;
				color: #71717a;
				margin: 0 0 1.5rem 0;
				max-width: 32rem;
			}
			button {
				font: inherit;
				font-size: 0.875rem;
				font-weight: 500;
				padding: 0.625rem 1.25rem;
				border: 1px solid #2c2d30;
				background: #2c2d30;
				color: #fafafa;
				cursor: pointer;
			}
			button:hover {
				background: #1a1b1d;
			}
			@media (prefers-color-scheme: dark) {
				html,
				body {
					background: #09090b;
					color: #fafafa;
				}
				p {
					color: #a1a1aa;
				}
				.glyph {
					background: #fafafa;
					color: #09090b;
				}
				button {
					background: #fafafa;
					color: #09090b;
					border-color: #fafafa;
				}
				button:hover {
					background: #e4e4e7;
				}
			}
		</style>
	</head>
	<body>
		<main class="wrap">
			<div class="glyph">/</div>
			<h1>You're offline</h1>
			<p>Threadline can't reach the network right now. Check your connection and try again.</p>
			<button onclick="location.reload()">Try again</button>
		</main>
	</body>
</html>
